# GraphQL mutations create data objects, not object folders.
# The create examples below use /Product Data/Families because that parent folder exists in the
# live environments. Change it to another existing folder if needed.

# Query a family by full path.
query GetAlphaFamily {
  getFamily(fullpath: "/Imports/ProductHierarchy/Families/TA-ALPHA") {
    id
    key
    fullpath
    published
    code
    name
    launchYear
    launchPeriod
    workingTitle
    description
  }
}

# Query a model by full path.
query GetAlphaModel {
  getModel(fullpath: "/Imports/ProductHierarchy/Families/TA-ALPHA/ALP-OPT-01") {
    id
    key
    fullpath
    code
    name
    frameBaseCode
    seriesCode
    material
    description
  }
}

# Query a frame and traverse the artBase relation back to the model.
query GetAlphaFrame {
  getFrame(fullpath: "/Imports/ProductHierarchy/Families/TA-ALPHA/ALP-OPT-01/ALP-OPT-01-101") {
    id
    key
    fullpath
    code
    name
    mainColorCode
    seriesCode
    ecomFileName
    exchangeCode
    artBase {
      id
      code
      name
      fullpath
    }
  }
}

# Create a family under an existing sample root folder.
mutation CreateFamily {
  createFamily(
    path: "/Product Data/Families"
    key: "TA-OMEGA"
    published: true
    input: {
      code: "TA-OMEGA"
      name: "Omega"
      launchYear: 2027
      launchPeriod: "sep"
      workingTitle: "Omega Working Title"
      description: "Sample family created through GraphQL"
    }
  ) {
    success
    message
    output {
      id
      fullpath
      code
      name
    }
  }
}

# Create a model inside a family.
mutation CreateModel {
  createModel(
    path: "/Product Data/Families/TA-OMEGA"
    key: "OME-OPT-01"
    published: true
    input: {
      code: "OME-OPT-01"
      name: "Omega Optical 01"
      frameBaseCode: "OME-OPT"
      seriesCode: "OMEGA-2027"
      material: "Beta titanium"
      description: "Sample model created through GraphQL"
    }
  ) {
    success
    message
    output {
      id
      fullpath
      code
      name
    }
  }
}

# Create a frame and set the artBase relation with an element descriptor.
mutation CreateFrame {
  createFrame(
    path: "/Product Data/Families/TA-OMEGA/OME-OPT-01"
    key: "OME-OPT-01-450"
    published: true
    input: {
      code: "OME-OPT-01-450"
      name: "Omega Optical Forest"
      mainColorCode: "450"
      seriesCode: "OMEGA-2027"
      ecomFileName: "ome-opt-01-450.jpg"
      exchangeCode: "EX-OME-450"
      artBase: {
        type: "object"
        fullpath: "/Product Data/Families/TA-OMEGA/OME-OPT-01"
      }
    }
  ) {
    success
    message
    output {
      id
      fullpath
      code
      name
    }
  }
}

# The frame class normalizes the object key/fullpath by appending the main color code.
# Update the Omega frame created above.
mutation UpdateFrame {
  updateFrame(
    fullpath: "/Product Data/Families/TA-OMEGA/OME-OPT-01/OME-OPT-01-450 450"
    input: {
      name: "Omega Optical Forest Updated"
      ecomFileName: "ome-opt-01-450-v2.jpg"
    }
  ) {
    success
    message
    output {
      id
      fullpath
      name
      ecomFileName
    }
  }
}

# Delete a frame by full path.
mutation DeleteFrame {
  deleteFrame(fullpath: "/Product Data/Families/TA-OMEGA/OME-OPT-01/OME-OPT-01-450 450") {
    success
    message
  }
}

# Delete the model after deleting its child frame.
mutation DeleteModel {
  deleteModel(fullpath: "/Product Data/Families/TA-OMEGA/OME-OPT-01") {
    success
    message
  }
}

# Delete the family after deleting its child model.
mutation DeleteFamily {
  deleteFamily(fullpath: "/Product Data/Families/TA-OMEGA") {
    success
    message
  }
}
